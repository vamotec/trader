# /etc/nginx/sites-available/vnc.trazar.ai
# 软链接到 sites-enabled：
# ln -s /etc/nginx/sites-available/vnc.trazar.ai /etc/nginx/sites-enabled/
# 然后：nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name vnc.trazar.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vnc.trazar.ai;

    # ── SSL（复用 cloudflare origin 证书） ───────────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── 双重鉴权：除了 VNC 自己的密码，再加一层 HTTP Basic Auth ───────────────
    # 生成密码文件：
    #   sudo sh -c "echo -n 'admin:' > /etc/nginx/.htpasswd_vnc && openssl passwd -apr1 >> /etc/nginx/.htpasswd_vnc"
    auth_basic           "VNC Access";
    auth_basic_user_file /etc/nginx/.htpasswd_vnc;

    # ── 反代 websockify（HTTP + WebSocket） ──────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:6080;
        proxy_http_version 1.1;

        # WebSocket 升级（VNC over WS 必需）
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # VNC 长连接
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
