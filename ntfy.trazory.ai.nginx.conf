# /etc/nginx/sites-available/ntfy.trazar.ai
# 软链接到 sites-enabled：
# ln -s /etc/nginx/sites-available/ntfy.trazar.ai /etc/nginx/sites-enabled/
# 然后：nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name ntfy.trazar.ai;
    # 强制跳转HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ntfy.trazar.ai;

    # ── SSL ──────────────────────────────────────────────────────────────────
    # 如果是通配符证书直接复用，路径按实际修改
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;

    # 如果是单域名证书，先申请再填：
    # certbot --nginx -d ntfy.trazar.ai
    # certbot会自动写入证书路径

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── ntfy 反向代理 ─────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # 关键：ntfy使用SSE（Server-Sent Events）长连接推送
        # 必须关闭proxy buffering，否则消息会被缓冲延迟
        proxy_buffering    off;
        proxy_set_header   Connection "";
        chunked_transfer_encoding on;

        # 长连接超时设长，避免频繁重连
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}