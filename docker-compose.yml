services:

  # ── IB Gateway ─────────────────────────────────────────────────────────────
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    restart: always
    environment:
      TWS_USERID:                       ${TWS_USERID}
      TWS_PASSWORD:                     ${TWS_PASSWORD}
      TRADING_MODE:                     ${TRADING_MODE:-paper}
      VNC_SERVER_PASSWORD:              ${VNC_SERVER_PASSWORD:-}
      READ_ONLY_API:                    ${READ_ONLY_API:-}
      TWOFA_TIMEOUT_ACTION:             ${TWOFA_TIMEOUT_ACTION:-exit}
      AUTO_RESTART_TIME:                ${AUTO_RESTART_TIME:-}
      RELOGIN_AFTER_TWOFA_TIMEOUT:      ${RELOGIN_AFTER_TWOFA_TIMEOUT:-no}
      TWOFA_EXIT_INTERVAL:              ${TWOFA_EXIT_INTERVAL:-60}
      TIME_ZONE:                        ${TIME_ZONE:-Etc/UTC}
    ports:
      - "127.0.0.1:4001:4003"   # live (socat)
      - "127.0.0.1:4002:4004"   # paper (socat)
      - "127.0.0.1:5900:5900"   # VNC（调试用，确认登录状态）

  # ── Trader ─────────────────────────────────────────────────────────────────
  trader:
    image: ghcr.io/vamotec/trader:latest
    restart: unless-stopped
    depends_on:
      - ib-gateway
    environment:
      IBKR_HOST: ib-gateway
      # gnzsnz 的 socat 代理端口：paper=4004, live=4003（直连 4002/4001 会被 TrustedIPs 拒绝）
      IBKR_PORT: 4004
      NTFY_URL: ${NTFY_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    volumes:
      - ./logs:/app/logs